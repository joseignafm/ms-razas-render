server:
  port: ${PORT:8081}

spring:
  application:
    name: ms-razas

  # Base de datos PostgreSQL (Render)
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Compatibilidad Spring Cloud y Arranque
  cloud:
    compatibility-verifier:
      enabled: false
  main:
    web-application-type: servlet

# Desactivar Eureka completamente
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# Documentación Swagger / OpenApi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
    version: openapi_3_0