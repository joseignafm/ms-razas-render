server:
  port: ${PORT:8081}

spring:
  application:
    name: ms-razas

  sql:
    init:
      mode: always

  # Base de datos PostgreSQL (Render)
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true

  # Compatibilidad Spring Cloud y Arranque
  cloud:
    compatibility-verifier:
      enabled: false
  main:
    web-application-type: servlet

# Desactivar Eureka completamente
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# Documentación Swagger / OpenApi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
    version: openapi_3_0